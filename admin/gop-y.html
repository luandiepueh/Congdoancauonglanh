<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản lý Góp ý - Công Đoàn</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<a href="#main" class="skip-link">Bỏ qua để đến nội dung chính</a>
<div class="bg-blob-1"></div><div class="bg-blob-2"></div><div class="bg-blob-3"></div>

<div class="admin-layout">
  <div class="admin-sidebar-backdrop" onclick="toggleAdminSidebar()"></div>
  <!-- SIDEBAR -->
  <aside class="admin-sidebar">
    <div class="sidebar-brand">
      <div class="d-flex align-items-center gap-2">
        <div style="width:36px;height:36px;background:rgba(255,255,255,.15);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:1.1rem"><i class="bi bi-people-fill text-warning"></i></div>
        <div><div class="s-title" id="sbOrg">Công Đoàn Cơ Sở</div><div class="s-sub">Ban Thường Trực</div></div>
      </div>
    </div>
    <nav class="admin-nav">
      <div class="nav-section-label">Tổng quan</div>
      <a href="index.html"     class="admin-nav-link"><i class="bi bi-speedometer2"></i>Dashboard</a>
      <div class="nav-section-label">Quản lý nội dung</div>
      <a href="thong-bao.html" class="admin-nav-link"><i class="bi bi-megaphone-fill"></i>Thông báo</a>
      <a href="tai-lieu.html"  class="admin-nav-link"><i class="bi bi-folder2-open"></i>Tài liệu</a>
      <a href="hoat-dong.html" class="admin-nav-link"><i class="bi bi-images"></i>Hoạt động</a>
      <a href="gop-y.html"     class="admin-nav-link active"><i class="bi bi-chat-left-dots-fill"></i>Góp ý</a>
      <div class="nav-section-label">Hệ thống</div>
      <a href="quan-tri-vien.html" class="admin-nav-link"><i class="bi bi-person-gear"></i>Quản trị viên</a>
      <a href="../index.html"  class="admin-nav-link" target="_blank"><i class="bi bi-box-arrow-up-right"></i>Xem trang công khai</a>
    </nav>
    <div class="sidebar-footer">
      <button class="admin-nav-link w-100 border-0 bg-transparent text-start" onclick="adminLogout()" style="color:rgba(255,255,255,.6)"><i class="bi bi-box-arrow-left"></i>Đăng xuất</button>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="admin-main" id="main">
    <div class="admin-topbar">
      <button type="button" class="admin-sidebar-toggle" onclick="toggleAdminSidebar()" aria-label="Mở/đóng menu điều hướng"><i class="bi bi-list"></i></button>
      <div>
        <div class="page-title">Quản lý Góp ý</div>
        <div class="page-sub">Tiếp nhận và phản hồi góp ý từ đoàn viên</div>
      </div>
      <div class="d-flex gap-2">
        <span class="badge bg-warning text-dark fs-6 px-3" id="pendingBadge" style="display:none!important">0 chờ</span>
      </div>
    </div>

    <div class="admin-content">
      <!-- FILTER -->
      <div class="app-card mb-4">
        <div class="card-body p-3 d-flex gap-2 flex-wrap align-items-center">
          <div class="btn-group btn-group-sm" id="statusFilter">
            <button class="btn btn-danger active" data-s="" onclick="setStatus(this,'')">Tất cả</button>
            <button class="btn btn-outline-danger" data-s="Chờ xử lý" onclick="setStatus(this,'Chờ xử lý')">Chờ xử lý</button>
            <button class="btn btn-outline-danger" data-s="Đã phản hồi" onclick="setStatus(this,'Đã phản hồi')">Đã phản hồi</button>
          </div>
          <div class="input-group input-group-sm ms-auto" style="max-width:240px">
            <span class="input-group-text"><i class="bi bi-search"></i></span>
            <input type="text" class="form-control" id="searchBox" placeholder="Tìm tên, nội dung..." oninput="renderFiltered()">
          </div>
          <span class="text-muted" style="font-size:.83rem"><span id="fbCount">0</span> góp ý</span>
        </div>
      </div>

      <!-- LIST -->
      <div id="fbList">
        <div class="text-center py-5"><div class="spinner-border text-danger"></div></div>
      </div>
    </div>
  </main>
</div>

<!-- REPLY MODAL -->
<div class="modal fade" id="replyModal" tabindex="-1" data-bs-backdrop="static">
  <div class="modal-dialog modal-lg">
    <div class="modal-content border-0 shadow-lg">
      <div class="modal-header" style="background:var(--success,#2e7d32);color:#fff">
        <h5 class="modal-title"><i class="bi bi-reply-fill me-2"></i>Phản hồi góp ý</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Đóng"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3 p-3" style="background:#fff5f5;border-left:4px solid var(--primary,#b71c1c);border-radius:4px">
          <div class="fw-semibold mb-1" id="rmName"></div>
          <div class="text-muted" style="font-size:.88rem" id="rmContent"></div>
          <small class="text-muted" id="rmDate"></small>
        </div>
        <input type="hidden" id="replyId">
        <div class="mb-1">
          <label class="form-label" for="replyContent">Nội dung phản hồi <span class="text-danger">*</span></label>
          <textarea class="form-control" id="replyContent" rows="5" placeholder="Nhập nội dung phản hồi..." style="resize:vertical"></textarea>
        </div>
      </div>
      <div class="modal-footer border-0">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
        <button class="btn fw-semibold px-4" style="background:#2e7d32;color:#fff;border-radius:8px" onclick="submitReply()">
          <i class="bi bi-send-fill me-1"></i>Gửi phản hồi
        </button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/config.js"></script>
<script>
  let allFb = [], curStatus = '';
  const replyModal = new bootstrap.Modal(document.getElementById('replyModal'));

  (async () => {
    const session = await requireAdmin('login.html');
    if (!session) return;
    document.getElementById('sbOrg').textContent = APP_CONFIG.orgName;
    loadFb();
  })();

  async function loadFb() {
    const { data } = await sb.from('feedback').select('*').order('status').order('created_at',{ascending:false});
    allFb = data || [];
    const pending = allFb.filter(f => f.status === 'Chờ xử lý').length;
    const pb = document.getElementById('pendingBadge');
    pb.textContent = `${pending} chờ xử lý`;
    pb.style.display = pending > 0 ? '' : 'none';
    renderFiltered();
  }

  function setStatus(btn, s) {
    curStatus = s;
    document.querySelectorAll('#statusFilter .btn').forEach(b => { b.classList.remove('btn-danger'); b.classList.add('btn-outline-danger'); });
    btn.classList.remove('btn-outline-danger'); btn.classList.add('btn-danger');
    renderFiltered();
  }

  function renderFiltered() {
    const q = document.getElementById('searchBox').value.toLowerCase();
    const list = allFb.filter(f => {
      const matchS = !curStatus || f.status === curStatus;
      const matchQ = !q || f.sender_name.toLowerCase().includes(q) || f.content.toLowerCase().includes(q) || (f.unit||'').toLowerCase().includes(q);
      return matchS && matchQ;
    });
    document.getElementById('fbCount').textContent = list.length;
    const el = document.getElementById('fbList');
    if (!list.length) {
      el.innerHTML = '<div class="empty-state"><i class="bi bi-chat-left-dots"></i><p class="mt-2">Không có góp ý nào.</p></div>';
      return;
    }
    el.innerHTML = list.map(f => `
      <div class="fb-item${f.status==='Đã phản hồi'?' replied':''} mb-3">
        <div class="d-flex align-items-start justify-content-between flex-wrap gap-2 mb-2">
          <div>
            <span class="fw-semibold">${escHtml(f.sender_name)}</span>
            ${f.unit ? `<span class="text-muted ms-1" style="font-size:.83rem">— ${escHtml(f.unit)}</span>` : ''}
            <span class="badge text-bg-light border ms-2" style="font-size:.72rem">${escHtml(f.category)}</span>
          </div>
          <div class="d-flex align-items-center gap-2">
            ${f.status==='Đã phản hồi'
              ? '<span class="status-da"><i class="bi bi-check-circle-fill"></i>Đã phản hồi</span>'
              : '<span class="status-cho"><i class="bi bi-clock"></i>Chờ xử lý</span>'}
            ${f.status==='Chờ xử lý' ? `<button class="btn btn-sm btn-success fw-semibold" onclick="openReply('${f.id}')"><i class="bi bi-reply-fill me-1"></i>Phản hồi</button>` : ''}
            <button class="btn btn-sm btn-outline-danger" onclick="delFb('${f.id}')" title="Xóa"><i class="bi bi-trash"></i></button>
          </div>
        </div>
        <p class="mb-1" style="font-size:.9rem">${escHtml(f.content)}</p>
        <small class="text-muted"><i class="bi bi-clock me-1"></i>${fmtDateTime(f.created_at)}</small>
        ${f.reply_content ? `
          <div class="fb-reply mt-2">
            <div class="fw-semibold text-success mb-1" style="font-size:.83rem"><i class="bi bi-chat-left-dots-fill me-1"></i>Phản hồi của bạn</div>
            <p class="mb-1" style="font-size:.87rem">${escHtml(f.reply_content)}</p>
            <small class="text-muted">${fmtDateTime(f.replied_at)}</small>
          </div>` : ''}
      </div>`).join('');
  }

  function openReply(id) {
    const f = allFb.find(x => x.id === id);
    document.getElementById('replyId').value    = id;
    document.getElementById('rmName').textContent    = f.sender_name + (f.unit ? ` — ${f.unit}` : '');
    document.getElementById('rmContent').textContent = f.content;
    document.getElementById('rmDate').textContent    = fmtDateTime(f.created_at);
    document.getElementById('replyContent').value   = '';
    replyModal.show();
  }

  async function submitReply() {
    const id      = document.getElementById('replyId').value;
    const content = document.getElementById('replyContent').value.trim();
    if (!content) { showToast('Vui lòng nhập nội dung phản hồi','danger'); return; }
    showLoading(true);
    const { error } = await sb.from('feedback').update({
      status: 'Đã phản hồi',
      reply_content: content,
      replied_at: new Date().toISOString()
    }).eq('id', id);
    showLoading(false);
    if (error) { showToast('Lỗi: '+error.message,'danger'); return; }
    showToast('Đã gửi phản hồi thành công!','success');
    replyModal.hide();
    loadFb();
  }

  async function delFb(id) {
    if (!confirm('Xóa góp ý này?')) return;
    const { error } = await sb.from('feedback').delete().eq('id', id);
    if (error) { showToast('Xóa thất bại','danger'); return; }
    showToast('Đã xóa','success');
    loadFb();
  }
</script>
</body>
</html>
