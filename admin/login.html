<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập Quản trị - Công Đoàn Cơ Sở</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .login-logo { width: 70px; height: 70px; background: linear-gradient(135deg,#b91c1c,#ef4444); border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 2rem; margin: 0 auto 1rem; box-shadow: 0 8px 24px rgba(239,68,68,.4); }
    .btn-login { background: linear-gradient(135deg,#b91c1c,#ef4444); color: #fff; border: none; border-radius: 12px; padding: .78rem; font-size: 1rem; font-weight: 700; width: 100%; transition: all .2s; box-shadow: 0 4px 16px rgba(239,68,68,.35); }
    .btn-login:hover { filter: brightness(1.1); color: #fff; transform: translateY(-1px); }
    .btn-login:disabled { background: #ccc; transform: none; }
  </style>
</head>
<body>
<div class="bg-blob-1"></div><div class="bg-blob-2"></div><div class="bg-blob-3"></div>

<div class="login-card">
  <div class="login-logo"><i class="bi bi-shield-lock-fill text-white"></i></div>
  <h4 class="text-center fw-bold mb-1" style="color:#b71c1c">Đăng nhập Quản trị</h4>
  <p class="text-center text-muted mb-4" style="font-size:.85rem" id="subTitle">Công Đoàn Cơ Sở</p>

  <div id="errMsg" class="alert alert-danger d-none" style="border-radius:10px;font-size:.88rem"></div>

  <div class="mb-3">
    <label class="form-label fw-semibold" for="email">Email</label>
    <div class="input-group">
      <span class="input-group-text" style="border-radius:8px 0 0 8px"><i class="bi bi-envelope text-muted"></i></span>
      <input type="email" class="form-control" id="email" placeholder="admin@email.com" style="border-radius:0 8px 8px 0">
    </div>
  </div>
  <div class="mb-4">
    <label class="form-label fw-semibold" for="password">Mật khẩu</label>
    <div class="input-group">
      <span class="input-group-text" style="border-radius:8px 0 0 8px"><i class="bi bi-lock text-muted"></i></span>
      <input type="password" class="form-control" id="password" placeholder="••••••••" style="border-radius:0 8px 8px 0" onkeypress="if(event.key==='Enter')doLogin()">
      <button class="btn btn-outline-secondary" type="button" style="border-radius:0 8px 8px 0" onclick="togglePwd()" aria-label="Hiện mật khẩu"><i class="bi bi-eye" id="eyeIcon"></i></button>
    </div>
  </div>

  <button class="btn-login" id="loginBtn" onclick="doLogin()">
    <span id="loginBtnText"><i class="bi bi-box-arrow-in-right me-2"></i>Đăng nhập</span>
  </button>

  <div class="text-center mt-3">
    <a href="../index.html" class="text-muted text-decoration-none" style="font-size:.83rem">
      <i class="bi bi-arrow-left me-1"></i>Quay về trang chủ
    </a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/config.js"></script>
<script>
  document.getElementById('subTitle').textContent = APP_CONFIG.orgName;

  // If already logged in, redirect
  sb.auth.getSession().then(({data:{session}}) => {
    if (session) window.location.href = 'index.html';
  });

  function togglePwd() {
    const inp = document.getElementById('password');
    const ico = document.getElementById('eyeIcon');
    const btn = ico.closest('button');
    if (inp.type === 'password') { inp.type = 'text'; ico.className = 'bi bi-eye-slash'; btn.setAttribute('aria-label', 'Ẩn mật khẩu'); }
    else { inp.type = 'password'; ico.className = 'bi bi-eye'; btn.setAttribute('aria-label', 'Hiện mật khẩu'); }
  }

  async function doLogin() {
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const errEl    = document.getElementById('errMsg');
    const btn      = document.getElementById('loginBtn');

    errEl.classList.add('d-none');
    if (!email || !password) { errEl.textContent = 'Vui lòng nhập email và mật khẩu.'; errEl.classList.remove('d-none'); return; }

    btn.disabled = true;
    document.getElementById('loginBtnText').innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Đang đăng nhập...';

    const { error } = await sb.auth.signInWithPassword({ email, password });

    if (error) {
      errEl.textContent = error.message.includes('Invalid') ? 'Email hoặc mật khẩu không đúng.' : error.message;
      errEl.classList.remove('d-none');
      btn.disabled = false;
      document.getElementById('loginBtnText').innerHTML = '<i class="bi bi-box-arrow-in-right me-2"></i>Đăng nhập';
    } else {
      window.location.href = 'index.html';
    }
  }
</script>
</body>
</html>
